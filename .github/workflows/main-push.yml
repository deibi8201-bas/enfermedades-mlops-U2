name: CD - Despliegue y Publicación en Main

on:
  push:
    branches:
      - main  

jobs:
  cd_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Permiso obligatorio para publicar imágenes en GitHub Packages

    steps:
      # 1. Descargar el código
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Verificación final de seguridad: Volver a correr los tests unitarios
      - name: Verificación final de pruebas unitarias
        run: |
          pytest test_app.py

      # 5. Iniciar sesión de forma segura en GitHub Container Registry (GHCR)
      - name: Autenticarse en GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Convertir el nombre del repositorio a minúsculas (Requisito de Docker)
      - name: Formatear nombre del repositorio
        id: string
        run: echo "repo_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 7. Construir y publicar la imagen de Docker de forma automatizada
      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.repo_name }}/mlops-enfermedades:latest
            ghcr.io/${{ steps.string.outputs.repo_name }}/mlops-enfermedades:${{ github.sha }}